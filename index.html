<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d1117">
<title>Stock App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & VARS ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:       #0d1117;
  --surface:  #161b22;
  --border:   #21262d;
  --border2:  #30363d;
  --text:     #e6edf3;
  --muted:    #7d8590;
  --blue:     #2f81f7;
  --blue-dim: #1a3a5c;
  --green:    #3fb950;
  --green-dim:#0d2f18;
  --red:      #f85149;
  --red-dim:  #2d0f0e;
  --amber:    #d29922;
  --font:     'DM Sans', sans-serif;
  --mono:     'DM Mono', monospace;
  --radius:   10px;
  --header-h: 56px;
  --tab-h:    48px;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; }

/* ── LAYOUT ──────────────────────────────────────────── */
#app { display: flex; flex-direction: column; height: 100%; max-width: 640px; margin: 0 auto; }

/* ── HEADER ──────────────────────────────────────────── */
header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  position: sticky; top: 0; z-index: 100;
}
.header-title { display: flex; align-items: center; gap: 10px; }
.header-title .icon { width: 28px; height: 28px; background: var(--blue); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 15px; }
.header-title h1 { font-size: 15px; font-weight: 600; letter-spacing: -.2px; }
.header-actions { display: flex; gap: 8px; }

/* ── IDENTITY BAR ────────────────────────────────────── */
#identity {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex; gap: 8px;
}
#identity input {
  flex: 1; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 8px; padding: 8px 12px; color: var(--text);
  font-family: var(--font); font-size: 13px;
}
#identity input:focus { outline: none; border-color: var(--blue); }
#identity input::placeholder { color: var(--muted); }

/* ── TABS ────────────────────────────────────────────── */
.tabs {
  height: var(--tab-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  position: sticky; top: var(--header-h); z-index: 99;
}
.tab {
  flex: 1; display: flex; align-items: center; justify-content: center;
  gap: 7px; font-size: 13px; font-weight: 500; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
  user-select: none;
}
.tab.active { color: var(--text); border-bottom-color: var(--blue); }
.tab .badge {
  background: var(--border2); color: var(--muted);
  font-size: 10px; font-family: var(--mono);
  padding: 1px 6px; border-radius: 20px;
  transition: background .15s, color .15s;
}
.tab.active .badge { background: var(--blue-dim); color: var(--blue); }

/* ── SEARCH ──────────────────────────────────────────── */
.search-bar {
  padding: 10px 16px;
  background: var(--bg);
  position: sticky; top: calc(var(--header-h) + var(--tab-h)); z-index: 98;
  border-bottom: 1px solid var(--border);
}
.search-wrap {
  position: relative;
}
.search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.search-wrap input {
  width: 100%; background: var(--surface); border: 1px solid var(--border2);
  border-radius: 8px; padding: 8px 12px 8px 34px;
  color: var(--text); font-family: var(--font); font-size: 13px;
}
.search-wrap input:focus { outline: none; border-color: var(--blue); }
.search-wrap input::placeholder { color: var(--muted); }
#clear-search {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--muted); cursor: pointer;
  padding: 2px; display: none; font-size: 16px; line-height: 1;
}

/* ── COL HEADERS ─────────────────────────────────────── */
.col-head {
  display: grid; gap: 6px;
  padding: 6px 16px;
  background: var(--bg);
  position: sticky;
  top: calc(var(--header-h) + var(--tab-h) + 46px);
  z-index: 97;
  border-bottom: 1px solid var(--border);
}
.col-head.beb { grid-template-columns: 1fr 68px 68px 68px; }
.col-head.cig { grid-template-columns: 1fr 90px 90px; }
.col-head span {
  font-size: 10px; font-family: var(--mono); color: var(--muted);
  text-transform: uppercase; letter-spacing: .5px; text-align: center;
}
.col-head span:first-child { text-align: left; }

/* ── PRODUCT LIST ────────────────────────────────────── */
#lista { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }

.item {
  display: grid; gap: 6px; align-items: center;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.item:active { background: var(--surface); }
.item.beb  { grid-template-columns: 1fr 68px 68px 68px; }
.item.cig  { grid-template-columns: 1fr 90px 90px; }
.item.filled { background: color-mix(in srgb, var(--blue-dim) 40%, transparent); }

.prod-name { font-size: 12px; line-height: 1.35; color: var(--text); }
.prod-name em { display: block; font-style: normal; font-size: 10px; color: var(--muted); font-family: var(--mono); }

.num {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 6px; padding: 6px 4px;
  color: var(--text); font-family: var(--mono); font-size: 13px;
  text-align: center; width: 100%;
  -moz-appearance: textfield;
  appearance: textfield;
}
.num::-webkit-inner-spin-button,
.num::-webkit-outer-spin-button { -webkit-appearance: none; }
.num:focus { outline: none; border-color: var(--blue); background: var(--blue-dim); }
.num.has-val { border-color: var(--green); color: var(--green); }

/* ── EMPTY / LOADING ─────────────────────────────────── */
.state-msg {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; padding: 60px 20px; color: var(--muted); text-align: center;
}
.state-msg .big { font-size: 32px; }
.state-msg p { font-size: 13px; }

/* ── FOOTER BAR ──────────────────────────────────────── */
.footer {
  position: fixed; bottom: 0; left: 0; right: 0;
  max-width: 640px; margin: 0 auto;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
}
.footer-info { flex: 1; font-size: 11px; color: var(--muted); font-family: var(--mono); }
.footer-info strong { color: var(--text); }

.btn {
  border: none; border-radius: 8px; padding: 9px 18px;
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .45; cursor: default; }
.btn-primary { background: var(--blue); color: white; }
.btn-ghost { background: var(--border); color: var(--text); font-size: 12px; padding: 9px 12px; }

/* ── TOAST ───────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text); padding: 10px 18px; border-radius: 20px;
  font-size: 13px; font-weight: 500;
  opacity: 0; pointer-events: none;
  transition: opacity .25s, transform .25s;
  white-space: nowrap; z-index: 999;
  box-shadow: 0 4px 24px rgba(0,0,0,.5);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok   { border-color: var(--green); color: var(--green); }
#toast.err  { border-color: var(--red);   color: var(--red); }

/* ── CONFIG MODAL ────────────────────────────────────── */
#modal {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
#modal.show { opacity: 1; pointer-events: all; }
.modal-box {
  width: 100%; max-width: 640px; margin: 0 auto;
  background: var(--surface); border-top: 1px solid var(--border2);
  border-radius: 14px 14px 0 0; padding: 20px;
  transform: translateY(100%); transition: transform .25s;
}
#modal.show .modal-box { transform: translateY(0); }
.modal-box h3 { font-size: 14px; font-weight: 600; margin-bottom: 14px; }
.modal-box label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; margin-top: 12px; text-transform: uppercase; font-family: var(--mono); }
.modal-box input {
  width: 100%; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 8px; padding: 9px 12px; color: var(--text);
  font-family: var(--mono); font-size: 12px;
}
.modal-box input:focus { outline: none; border-color: var(--blue); }
.modal-box input::placeholder { color: var(--muted); }
.modal-footer { display: flex; gap: 8px; margin-top: 16px; }
.modal-footer .btn { flex: 1; justify-content: center; }

/* ── DESKTOP ─────────────────────────────────────────── */
@media (min-width: 600px) {
  .item.beb  { grid-template-columns: 1fr 80px 80px 80px; }
  .item.cig  { grid-template-columns: 1fr 100px 100px; }
  .col-head.beb { grid-template-columns: 1fr 80px 80px 80px; }
  .col-head.cig { grid-template-columns: 1fr 100px 100px; }
}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-title">
      <div class="icon">📦</div>
      <h1>Stock App</h1>
    </div>
    <div class="header-actions">
      <button class="btn btn-ghost" onclick="openModal()" title="Configurar URL">⚙️</button>
    </div>
  </header>

  <div id="identity">
    <input type="text" id="nombre" placeholder="Tu nombre" autocomplete="name">
    <input type="date"  id="fecha">
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-beb" onclick="setTab('bebidas')">
      🥤 Bebidas <span class="badge" id="badge-beb">0</span>
    </div>
    <div class="tab" id="tab-cig" onclick="setTab('cigarrillos')">
      🚬 Cigarrillos <span class="badge" id="badge-cig">0</span>
    </div>
  </div>

  <div class="search-bar">
    <div class="search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="buscar" placeholder="Buscar producto…" oninput="onSearch(this.value)">
      <button id="clear-search" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div class="col-head beb" id="col-head"></div>

  <div id="lista">
    <div class="state-msg"><div class="big">⚙️</div><p>Configurá la URL del Script<br>tocando el botón ⚙️ arriba</p></div>
  </div>

</div>

<!-- Footer -->
<div class="footer">
  <div class="footer-info" id="footer-info">Sin datos cargados</div>
  <button class="btn btn-ghost" id="btn-limpiar" onclick="limpiarTab()" style="display:none">Limpiar</button>
  <button class="btn btn-primary" id="btn-guardar" onclick="guardar()" disabled>Guardar</button>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Config Modal -->
<div id="modal">
  <div class="modal-box">
    <h3>⚙️ Configuración</h3>
    <label>URL del Apps Script Web App</label>
    <input type="url" id="cfg-url" placeholder="https://script.google.com/macros/s/.../exec">
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveConfig()">Guardar y conectar</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────
let SCRIPT_URL = localStorage.getItem("stock_url") || "";
let tabActual  = "bebidas";
let productos  = { bebidas: [], cigarrillos: [] };
let valores    = { bebidas: {}, cigarrillos: {} };
let cargado    = { bebidas: false, cigarrillos: false };

// ── INIT ───────────────────────────────────────────────────
document.getElementById("fecha").value = new Date().toISOString().slice(0,10);

const savedNombre = localStorage.getItem("stock_nombre");
if (savedNombre) document.getElementById("nombre").value = savedNombre;
document.getElementById("nombre").addEventListener("change", e => {
  localStorage.setItem("stock_nombre", e.target.value);
});

if (SCRIPT_URL) {
  cargarProductos("bebidas");
  cargarProductos("cigarrillos");
}

// ── TABS ───────────────────────────────────────────────────
function setTab(tab) {
  tabActual = tab;
  document.getElementById("tab-beb").classList.toggle("active", tab === "bebidas");
  document.getElementById("tab-cig").classList.toggle("active", tab === "cigarrillos");
  document.getElementById("buscar").value = "";
  document.getElementById("clear-search").style.display = "none";
  renderColHead();
  renderLista("");
  updateFooter();
}

// ── CARGAR PRODUCTOS ───────────────────────────────────────
async function cargarProductos(tipo) {
  if (!SCRIPT_URL) return;
  try {
    const r = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action: "productos", tipo }),
    });
    const j = await r.json();
    if (j.ok) {
      productos[tipo] = j.data;
      j.data.forEach(p => {
        if (!valores[tipo][p]) valores[tipo][p] = { deposito: "", camara: "", gondola: "" };
      });
      cargado[tipo] = true;
      document.getElementById(`badge-${tipo === "bebidas" ? "beb" : "cig"}`).textContent = j.data.length;
      if (tipo === tabActual) { renderColHead(); renderLista(""); }
    } else {
      toast("Error: " + j.error, false);
    }
  } catch(e) {
    toast("Sin conexión o URL incorrecta", false);
  }
}

// ── RENDER COLUMN HEADERS ──────────────────────────────────
function renderColHead() {
  const ch = document.getElementById("col-head");
  const beb = tabActual === "bebidas";
  ch.className = `col-head ${beb ? "beb" : "cig"}`;
  ch.innerHTML = beb
    ? `<span>Producto</span><span>Depósito</span><span>Cámara</span><span>Góndola</span>`
    : `<span>Producto</span><span>Depósito</span><span>Góndola</span>`;
}

// ── RENDER LISTA ───────────────────────────────────────────
function renderLista(filtro) {
  const lista = document.getElementById("lista");
  const prods = productos[tabActual];

  if (!SCRIPT_URL) {
    lista.innerHTML = `<div class="state-msg"><div class="big">⚙️</div><p>Configurá la URL del Script<br>tocando el botón ⚙️ arriba</p></div>`;
    return;
  }
  if (!cargado[tabActual]) {
    lista.innerHTML = `<div class="state-msg"><div class="big">⏳</div><p>Cargando productos…</p></div>`;
    return;
  }
  if (!prods.length) {
    lista.innerHTML = `<div class="state-msg"><div class="big">📋</div><p>No hay productos en esta hoja.<br>Añadilos en el Google Sheet.</p></div>`;
    return;
  }

  const f = filtro.toLowerCase();
  const vis = f ? prods.filter(p => p.toLowerCase().includes(f)) : prods;

  if (!vis.length) {
    lista.innerHTML = `<div class="state-msg"><div class="big">🔍</div><p>Sin resultados para "<strong>${filtro}</strong>"</p></div>`;
    return;
  }

  const beb = tabActual === "bebidas";
  lista.innerHTML = vis.map(prod => {
    const v  = valores[tabActual][prod] || {};
    const id = CSS.escape(prod);
    const filled = v.deposito || v.camara || v.gondola;
    const label = prod.length > 45 ? prod.slice(0,43) + "…" : prod;
    return `<div class="item ${beb ? "beb" : "cig"}${filled ? " filled" : ""}" id="row-${id}">
      <span class="prod-name">${label}</span>
      <input class="num${v.deposito ? " has-val" : ""}" type="number" min="0" inputmode="numeric"
        placeholder="—" value="${v.deposito || ""}"
        onchange="setVal('${prod.replace(/'/g,"\\'")}','deposito',this)" oninput="setVal('${prod.replace(/'/g,"\\'")}','deposito',this)">
      ${beb ? `<input class="num${v.camara ? " has-val" : ""}" type="number" min="0" inputmode="numeric"
        placeholder="—" value="${v.camara || ""}"
        onchange="setVal('${prod.replace(/'/g,"\\'")}','camara',this)" oninput="setVal('${prod.replace(/'/g,"\\'")}','camara',this)">` : ""}
      <input class="num${v.gondola ? " has-val" : ""}" type="number" min="0" inputmode="numeric"
        placeholder="—" value="${v.gondola || ""}"
        onchange="setVal('${prod.replace(/'/g,"\\'")}','gondola',this)" oninput="setVal('${prod.replace(/'/g,"\\'")}','gondola',this)">
    </div>`;
  }).join("");
  updateFooter();
}

// ── SET VALOR ──────────────────────────────────────────────
function setVal(prod, campo, el) {
  if (!valores[tabActual][prod]) valores[tabActual][prod] = {};
  valores[tabActual][prod][campo] = el.value;
  el.classList.toggle("has-val", !!el.value);
  // mark row filled
  const v = valores[tabActual][prod];
  const row = document.getElementById("row-" + CSS.escape(prod));
  if (row) row.classList.toggle("filled", !!(v.deposito || v.camara || v.gondola));
  updateFooter();
}

// ── SEARCH ─────────────────────────────────────────────────
function onSearch(val) {
  document.getElementById("clear-search").style.display = val ? "block" : "none";
  renderLista(val);
}
function clearSearch() {
  document.getElementById("buscar").value = "";
  document.getElementById("clear-search").style.display = "none";
  renderLista("");
}

// ── FOOTER ─────────────────────────────────────────────────
function updateFooter() {
  const items = countItems();
  const fi = document.getElementById("footer-info");
  fi.innerHTML = items > 0
    ? `<strong>${items}</strong> producto${items !== 1 ? "s" : ""} con stock`
    : `Sin datos ingresados`;
  document.getElementById("btn-guardar").disabled = items === 0;
  document.getElementById("btn-limpiar").style.display = items > 0 ? "" : "none";
}
function countItems() {
  return Object.values(valores[tabActual]).filter(v => v.deposito || v.camara || v.gondola).length;
}

// ── LIMPIAR ────────────────────────────────────────────────
function limpiarTab() {
  if (!confirm("¿Limpiar todos los valores de esta pestaña?")) return;
  Object.keys(valores[tabActual]).forEach(k => { valores[tabActual][k] = { deposito:"", camara:"", gondola:"" }; });
  renderLista(document.getElementById("buscar").value);
}

// ── GUARDAR ────────────────────────────────────────────────
async function guardar() {
  const nombre = document.getElementById("nombre").value.trim();
  const fecha  = document.getElementById("fecha").value;
  if (!nombre) { toast("Ingresá tu nombre", false); return; }
  if (!fecha)  { toast("Seleccioná la fecha", false); return; }
  if (!SCRIPT_URL) { openModal(); return; }

  const items = Object.entries(valores[tabActual])
    .filter(([_, v]) => v.deposito || v.camara || v.gondola)
    .map(([prod, v]) => ({ producto: prod, deposito: v.deposito||0, camara: v.camara||0, gondola: v.gondola||0 }));

  if (!items.length) { toast("Sin valores para guardar", false); return; }

  const btn = document.getElementById("btn-guardar");
  btn.disabled = true; btn.textContent = "Guardando…";

  try {
    const r = await fetch(SCRIPT_URL, {
      method:  "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action: "guardar", tipo: tabActual, nombre, fecha, items }),
    });
    const j = await r.json();
    if (j.ok) {
      toast(`✅ ${j.guardados} productos guardados`, true);
      items.forEach(i => { valores[tabActual][i.producto] = { deposito:"", camara:"", gondola:"" }; });
      renderLista(document.getElementById("buscar").value);
    } else {
      toast("Error: " + j.error, false);
    }
  } catch(e) {
    toast("Error de conexión", false);
  }

  btn.disabled = false; btn.textContent = "Guardar";
}

// ── TOAST ──────────────────────────────────────────────────
let toastTimer;
function toast(msg, ok) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "show " + (ok ? "ok" : "err");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ""; }, 3000);
}

// ── MODAL CONFIG ───────────────────────────────────────────
function openModal() {
  document.getElementById("cfg-url").value = SCRIPT_URL;
  document.getElementById("modal").classList.add("show");
}
function closeModal() {
  document.getElementById("modal").classList.remove("show");
}
function saveConfig() {
  const url = document.getElementById("cfg-url").value.trim();
  if (!url) { toast("Ingresá la URL", false); return; }
  SCRIPT_URL = url;
  localStorage.setItem("stock_url", url);
  closeModal();
  toast("Conectando…", true);
  cargado.bebidas = false; cargado.cigarrillos = false;
  cargarProductos("bebidas");
  cargarProductos("cigarrillos");
}
// close modal clicking outside
document.getElementById("modal").addEventListener("click", e => { if (e.target === document.getElementById("modal")) closeModal(); });

// ── INIT RENDER ────────────────────────────────────────────
renderColHead();
</script>
</body>
</html>
